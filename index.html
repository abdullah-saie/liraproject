<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>SYP Markets — Live Exchange Rates</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b0f;
  --bg1:#0d1117;
  --bg2:#111820;
  --bg3:#19222e;
  --border:#1c2530;
  --border2:#243040;
  --text:#d0dce8;
  --muted:#4a5e70;
  --dim:#2a3a4a;
  --green:#0ecb81;
  --green2:#0ecb8118;
  --red:#f6465d;
  --red2:#f6465d18;
  --gold:#f0b429;
  --blue:#3b82f6;
  --purple:#8b5cf6;
  --mono:'Geist Mono',monospace;
  --sans:'Syne',sans-serif;
  --radius:6px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;overflow:hidden}

/* ── LAYOUT ── */
.app{display:grid;grid-template-rows:48px 1fr 28px;height:100vh}
.app-body{display:grid;grid-template-columns:260px 1fr;overflow:hidden}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;gap:0;
  background:var(--bg1);border-bottom:1px solid var(--border);
  padding:0 12px;gap:12px;overflow:hidden;
}
.logo{
  font-family:var(--sans);font-weight:800;font-size:15px;
  letter-spacing:-0.02em;white-space:nowrap;
  display:flex;align-items:center;gap:6px;padding-right:12px;
  border-right:1px solid var(--border);
}
.logo-badge{
  font-size:8px;font-family:var(--mono);font-weight:500;
  background:var(--green);color:#000;padding:2px 5px;border-radius:3px;letter-spacing:0.08em;
}
.live-dot{
  width:5px;height:5px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px var(--green);animation:blink 2s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.ticker-bar{display:flex;gap:0;flex:1;overflow:hidden}
.tick{
  display:flex;align-items:center;gap:6px;padding:0 12px;
  border-right:1px solid var(--border);white-space:nowrap;
  cursor:pointer;transition:background .12s;font-size:11px;height:48px;
}
.tick:hover{background:var(--bg2)}
.tick.active{background:var(--bg2)}
.tick-sym{color:var(--muted);font-size:9px;letter-spacing:.1em}
.tick-price{font-weight:600;font-size:12px}
.tick-chg{font-size:10px}
.up{color:var(--green)}.dn{color:var(--red)}.neu{color:var(--muted)}

.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.clock{font-size:11px;color:var(--muted);font-family:var(--mono)}

/* ── SIDEBAR ── */
.sidebar{
  background:var(--bg1);border-right:1px solid var(--border);
  overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;
}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2)}

.sb-section{border-bottom:1px solid var(--border);padding:14px 14px 12px}
.sb-label{
  font-size:8px;letter-spacing:.18em;color:var(--dim);
  text-transform:uppercase;margin-bottom:10px;font-weight:500;
}

/* Price hero */
.price-hero{padding:16px 14px 14px;border-bottom:1px solid var(--border)}
.ph-pair{font-size:9px;letter-spacing:.15em;color:var(--muted);margin-bottom:2px}
.ph-price{
  font-family:var(--sans);font-size:34px;font-weight:800;
  letter-spacing:-0.03em;line-height:1;margin-bottom:8px;
  transition:color .4s;
}
.ph-price.up-flash{color:var(--green)}
.ph-price.dn-flash{color:var(--red)}
.ph-bs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.ph-bs-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px}
.ph-bs-label{font-size:8px;color:var(--muted);letter-spacing:.1em;margin-bottom:2px}
.ph-bs-val{font-size:13px;font-weight:600}
.ph-buy .ph-bs-val{color:var(--green)}
.ph-sell .ph-bs-val{color:var(--red)}
.ph-spread{
  display:flex;justify-content:space-between;
  font-size:10px;color:var(--muted);
}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.stat{background:var(--bg1);padding:8px 10px}
.stat-l{font-size:8px;color:var(--muted);letter-spacing:.08em;margin-bottom:3px}
.stat-v{font-size:12px;font-weight:600}

/* Market rows */
.mkt-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .1s;border-radius:4px;
  padding:7px 6px;margin:0 -6px;
}
.mkt-row:last-child{border-bottom:none}
.mkt-row:hover{background:var(--bg2)}
.mkt-left{display:flex;align-items:center;gap:8px}
.mkt-icon{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;background:var(--bg3);border:1px solid var(--border2);
  flex-shrink:0;
}
.mkt-name{font-size:11px;font-weight:600}
.mkt-sub{font-size:9px;color:var(--muted);margin-top:1px}
.mkt-right{text-align:right}
.mkt-price{font-size:12px;font-weight:600}
.mkt-chg{font-size:10px;margin-top:1px}

/* Fuel */
.fuel-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.fuel-row:last-child{border-bottom:none}
.fuel-icon{font-size:16px;margin-left:6px}
.fuel-name{font-size:11px;font-weight:500}
.fuel-syp{font-size:12px;font-weight:700}
.fuel-usd{font-size:9px;color:var(--muted);margin-top:1px;text-align:right}

/* ── MAIN CHART AREA ── */
.main{display:flex;flex-direction:column;background:var(--bg);overflow:hidden}

/* Toolbar */
.toolbar{
  display:flex;align-items:center;gap:0;
  background:var(--bg1);border-bottom:1px solid var(--border);
  padding:0 8px;height:38px;overflow-x:auto;flex-shrink:0;
}
.toolbar::-webkit-scrollbar{display:none}
.tb-group{display:flex;gap:0;padding:0 6px;border-right:1px solid var(--border)}
.tb-group:last-child{border-right:none;margin-left:auto}
.tb-btn{
  font-family:var(--mono);font-size:10px;
  background:none;border:none;color:var(--muted);
  padding:4px 8px;border-radius:4px;cursor:pointer;
  transition:all .12s;letter-spacing:.04em;white-space:nowrap;
  display:flex;align-items:center;gap:4px;
}
.tb-btn:hover{background:var(--bg3);color:var(--text)}
.tb-btn.active{background:var(--bg3);color:var(--gold)}
.tb-sep{width:1px;background:var(--border);margin:6px 2px;flex-shrink:0}

/* Chart wrapper */
.chart-wrap{flex:1;position:relative;overflow:hidden}
#chart{width:100%;height:100%}

/* Crosshair overlay */
.xhair-bar{
  position:absolute;top:8px;left:8px;
  display:flex;gap:10px;align-items:center;
  background:var(--bg1);border:1px solid var(--border2);
  padding:5px 12px;border-radius:var(--radius);
  font-size:10px;pointer-events:none;opacity:0;transition:opacity .1s;
  backdrop-filter:blur(4px);
}
.xhair-bar.show{opacity:1}
.xh-item{display:flex;gap:5px}
.xh-l{color:var(--muted)}
.xh-v{font-weight:600}

/* Loading */
.loader{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  background:var(--bg);z-index:20;transition:opacity .3s;
}
.loader.gone{opacity:0;pointer-events:none}
.spin{
  width:24px;height:24px;border:2px solid var(--border2);
  border-top-color:var(--green);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-txt{font-size:10px;color:var(--muted);letter-spacing:.12em}

/* Drawing tools panel */
.draw-panel{
  position:absolute;left:8px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:4px;
  background:var(--bg1);border:1px solid var(--border2);
  padding:6px;border-radius:8px;z-index:10;
}
.draw-btn{
  width:30px;height:30px;border-radius:5px;border:1px solid transparent;
  background:none;color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:all .12s;
}
.draw-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.draw-btn.active{background:var(--bg3);color:var(--gold);border-color:var(--gold)40}
.draw-sep{height:1px;background:var(--border);margin:2px 0}

/* ── STATUSBAR ── */
.statusbar{
  display:flex;align-items:center;gap:16px;padding:0 12px;
  background:var(--bg1);border-top:1px solid var(--border);
  font-size:10px;color:var(--muted);overflow:hidden;
}
.sb-dot{width:4px;height:4px;border-radius:50%;background:var(--green);flex-shrink:0}
.sb-sep{color:var(--border2)}

/* ── MOBILE ── */
@media(max-width:768px){
  .app{grid-template-rows:48px 1fr auto 28px}
  .app-body{grid-template-columns:1fr;grid-template-rows:1fr auto}
  .sidebar{
    order:2;max-height:45vh;border-right:none;
    border-top:1px solid var(--border);
    display:grid;grid-template-columns:repeat(2,1fr);
    grid-auto-rows:min-content;overflow-y:auto;
  }
  .price-hero{grid-column:1/-1}
  .draw-panel{left:4px}
  .ticker-bar .tick:nth-child(n+4){display:none}
  .topbar{padding:0 8px;gap:8px}
}
@media(max-width:480px){
  .app-body{grid-template-rows:1fr auto}
  .sidebar{grid-template-columns:1fr;max-height:50vh}
  .ticker-bar .tick:nth-child(n+3){display:none}
}
</style>
</head>
<body>
<div class="app">

<!-- ── TOPBAR ─────────────────────────────────────────────── -->
<header class="topbar">

<!-- ── SIDEBAR ────────────────────────────────────────────── -->
<aside class="sidebar">

<script>
// ══════════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════════
const API   = 'http://localhost:8000';
const REFRESH = 5 * 60 * 1000;

// ══════════════════════════════════════════════════════════════════
//  STATIC DATA (shown while backend accumulates history)
// ══════════════════════════════════════════════════════════════════
const CRYPTO_DATA = [
  { sym:'BTC', name:'Bitcoin',  icon:'₿', price:103420, chg:+1.82, unit:'USD' },
  { sym:'ETH', name:'Ethereum', icon:'Ξ', price:3840,   chg:+2.41, unit:'USD' },
  { sym:'BNB', name:'BNB',      icon:'⬡', price:612,    chg:-0.34, unit:'USD' },
];
const GOLD_DATA = [
  { karat:'24K', buy:1999200, sell:2019400 },
  { karat:'21K', buy:1749300, sell:1767000 },
  { karat:'18K', buy:1499400, sell:1514500 },
];
const FUEL_DATA = [
  { icon:'⛽', name:'Gasoline',  syp:10070, usd:0.85 },
  { icon:'🛢️', name:'Diesel',    syp:8890,  usd:0.75 },
  { icon:'🔵', name:'LPG Gas',   syp:124430, usd:10.50 },
];
const FX_DATA = [
  { sym:'EUR', name:'Euro',          buy:13800, sell:14000, chg:+0.30 },
  { sym:'TRY', name:'Turkish Lira',  buy:266,   sell:270,   chg:-0.20 },
  { sym:'SAR', name:'Saudi Riyal',   buy:3109,  sell:3159,  chg:+0.10 },
  { sym:'AED', name:'UAE Dirham',    buy:3175,  sell:3226,  chg:+0.05 },
  { sym:'GBP', name:'Pound Sterling',buy:14800, sell:15000, chg:+0.44 },
];

// ══════════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════════
let chart, mainSeries;
let currentTF = '1H', currentCT = 'candle';
let allData = [], isDemoMode = false;
let drawings = [];
let activeTool = 'cursor';
let drawingStart = null, tempLine = null;

// ══════════════════════════════════════════════════════════════════
//  INIT CHART
// ══════════════════════════════════════════════════════════════════
function initChart() {
  const wrap = document.getElementById('chart-wrap');
  chart = LightweightCharts.createChart(document.getElementById('chart'), {
    width:  wrap.clientWidth,
    height: wrap.clientHeight,
    layout: {
      background:{ color:'#080b0f' },
      textColor:'#4a5e70',
      fontFamily:"'Geist Mono',monospace",
      fontSize: 11,
    },
    grid:{
      vertLines:{ color:'#111820' },
      horzLines:{ color:'#111820' },
    },
    crosshair:{
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine:{ color:'#3b82f640', labelBackgroundColor:'#111820' },
      horzLine:{ color:'#3b82f640', labelBackgroundColor:'#111820' },
    },
    rightPriceScale:{
      borderColor:'#1c2530',
      scaleMargins:{ top:0.08, bottom:0.05 },
    },
    timeScale:{
      borderColor:'#1c2530',
      timeVisible:true,
      secondsVisible:false,
      rightOffset:8,
    },
    handleScroll:{ mouseWheel:true, pressedMouseMove:true, horzTouchDrag:true },
    handleScale:{ axisPressedMouseMove:true, mouseWheel:true, pinch:true },
  });

  chart.subscribeCrosshairMove(p => {
    const bar = document.getElementById('xhair-bar');
    if (!p.time) { bar.classList.remove('show'); return; }
    const d = p.seriesData?.get(mainSeries);
    if (!d) { bar.classList.remove('show'); return; }
    bar.classList.add('show');
    const f = v => v != null ? Math.round(v).toLocaleString() : '—';
    document.getElementById('xh-o').textContent = f(d.open ?? d.value);
    document.getElementById('xh-h').textContent = f(d.high ?? d.value);
    document.getElementById('xh-l').textContent = f(d.low  ?? d.value);
    document.getElementById('xh-c').textContent = f(d.close?? d.value);
    const spread = (d.high && d.low) ? Math.round(d.high - d.low) : '—';
    document.getElementById('xh-s').textContent = typeof spread === 'number' ? spread.toLocaleString() : spread;
  });

  new ResizeObserver(() => {
    chart.applyOptions({ width: wrap.clientWidth, height: wrap.clientHeight });
  }).observe(wrap);
}

// ══════════════════════════════════════════════════════════════════
//  SERIES
// ══════════════════════════════════════════════════════════════════
function makeSeries(type) {
  if (mainSeries) { try { chart.removeSeries(mainSeries); } catch(e){} }
  if (type === 'candle') {
    mainSeries = chart.addCandlestickSeries({
      upColor:'#0ecb81', downColor:'#f6465d',
      borderUpColor:'#0ecb81', borderDownColor:'#f6465d',
      wickUpColor:'#0ecb8166', wickDownColor:'#f6465d66',
    });
  } else if (type === 'area') {
    mainSeries = chart.addAreaSeries({
      lineColor:'#3b82f6', topColor:'#3b82f630', bottomColor:'#3b82f600', lineWidth:2,
    });
  } else if (type === 'bar') {
    mainSeries = chart.addBarSeries({
      upColor:'#0ecb81', downColor:'#f6465d',
    });
  } else {
    mainSeries = chart.addLineSeries({ color:'#0ecb81', lineWidth:2 });
  }
}

function toSeriesData(raw, type) {
  if (type === 'candle' || type === 'bar') return raw;
  return raw.map(d => ({ time: d.time, value: (d.open + d.close) / 2 }));
}

// ══════════════════════════════════════════════════════════════════
//  HISTORICAL PADDING (while real data accumulates)
// ══════════════════════════════════════════════════════════════════
function padHistory(realData) {
  if (realData.length >= 20) return realData;
  const anchor = realData.length ? realData[0] : null;
  const endP   = anchor ? anchor.open : 11800;
  const stopAt = anchor ? anchor.time : Math.floor(Date.now()/1000);
  const STEP   = 3600, DAYS = 30;
  const pts    = [];
  let p = endP * (0.88 + Math.random() * 0.1);
  for (let i = DAYS * 24; i >= 0; i--) {
    const t = stopAt - i * STEP;
    if (t >= stopAt) break;
    const drift = (endP - p) / (i + 1);
    const noise = (Math.random() - 0.48) * 100;
    const o = p, c = Math.max(8000, p + drift + noise);
    const h = Math.max(o,c) + Math.random()*50, l = Math.min(o,c) - Math.random()*50;
    pts.push({ time:Math.floor(t), open:Math.round(o), high:Math.round(h), low:Math.round(l), close:Math.round(c) });
    p = c;
  }
  return [...pts, ...realData];
}

// ══════════════════════════════════════════════════════════════════
//  TIMEFRAME FILTER
// ══════════════════════════════════════════════════════════════════
function filterTF(data, tf) {
  if (tf === 'ALL') return data;
  const now = Math.floor(Date.now()/1000);
  const spans = { '1H':3600,'4H':14400,'1D':86400,'1W':604800,'1M':2592000 };
  const s = spans[tf]; if (!s) return data;
  return data.filter(d => d.time >= now - s);
}

// ══════════════════════════════════════════════════════════════════
//  RENDER CHART
// ══════════════════════════════════════════════════════════════════
function renderChart(data) {
  if (!data.length) return;
  makeSeries(currentCT);
  // Deduplicate by time
  const seen = new Set(), clean = [];
  for (const d of data) { if (!seen.has(d.time)) { seen.add(d.time); clean.push(d); } }
  clean.sort((a,b) => a.time - b.time);
  mainSeries.setData(toSeriesData(clean, currentCT));
  chart.timeScale().fitContent();
}

function refresh() {
  const padded   = padHistory(allData);
  const filtered = filterTF(padded, currentTF);
  renderChart(filtered);
}

// ══════════════════════════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════════════════════════
async function fetchHistory() {
  const r = await fetch(`${API}/api/history?currency=USD&limit=2000`);
  if (!r.ok) throw new Error(r.status);
  return (await r.json()).data;
}
async function fetchLatest() {
  const r = await fetch(`${API}/api/latest?currency=USD`);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

// ══════════════════════════════════════════════════════════════════
//  SIDEBAR RENDERS
// ══════════════════════════════════════════════════════════════════
function fmtN(v) { return v != null ? Math.round(v).toLocaleString() : '—'; }
function chgCls(v) { return v > 0 ? 'up' : v < 0 ? 'dn' : 'neu'; }
function chgStr(v) { return (v >= 0 ? '+' : '') + v.toFixed(2) + '%'; }

function renderCrypto() {
  document.getElementById('crypto-list').innerHTML = CRYPTO_DATA.map(c => `
    <div class="mkt-row">
      <div class="mkt-left">
        <div class="mkt-icon">${c.icon}</div>
        <div><div class="mkt-name">${c.sym}</div><div class="mkt-sub">${c.name}</div></div>
      </div>
      <div class="mkt-right">
        <div class="mkt-price">$${c.price.toLocaleString()}</div>
        <div class="mkt-chg ${chgCls(c.chg)}">${chgStr(c.chg)}</div>
      </div>
    </div>`).join('');
}

function renderGold() {
  document.getElementById('gold-list').innerHTML = GOLD_DATA.map(g => `
    <div class="mkt-row">
      <div class="mkt-left">
        <div class="mkt-icon">🥇</div>
        <div><div class="mkt-name">${g.karat}</div><div class="mkt-sub">Gold · per gram</div></div>
      </div>
      <div class="mkt-right">
        <div class="mkt-price">${fmtN(g.buy)} SYP</div>
        <div class="mkt-chg neu">Sell: ${fmtN(g.sell)}</div>
      </div>
    </div>`).join('');
}

function renderFuel() {
  document.getElementById('fuel-list').innerHTML = FUEL_DATA.map(f => `
    <div class="fuel-row">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="fuel-icon">${f.icon}</span>
        <div><div class="fuel-name">${f.name}</div></div>
      </div>
      <div>
        <div class="fuel-syp">${fmtN(f.syp)} <span style="font-size:9px;color:var(--muted)">SYP</span></div>
        <div class="fuel-usd">$${f.usd}/L</div>
      </div>
    </div>`).join('');
}

function renderFX(fxList) {
  document.getElementById('fx-list').innerHTML = fxList.map(f => `
    <div class="mkt-row">
      <div class="mkt-left">
        <div class="mkt-icon" style="font-size:10px;font-weight:700">${f.sym}</div>
        <div><div class="mkt-name">${f.sym}/SYP</div><div class="mkt-sub">${f.name}</div></div>
      </div>
      <div class="mkt-right">
        <div class="mkt-price">${fmtN((f.buy+f.sell)/2)}</div>
        <div class="mkt-chg ${chgCls(f.chg)}">${chgStr(f.chg)}</div>
      </div>
    </div>`).join('');
}

function renderTicker(fxList, usdLatest) {
  const usdMid = usdLatest ? Math.round((usdLatest.buy + usdLatest.sell) / 2) : 11815;
  const items = [
    { sym:'USD', price:usdMid, chg:0 },
    ...fxList.slice(0,3).map(f=>({ sym:f.sym, price:Math.round((f.buy+f.sell)/2), chg:f.chg })),
    { sym:'BTC', price:103420, chg:+1.82 },
    { sym:'XAU', price:5279, chg:+0.12, unit:'$/oz' },
  ];
  document.getElementById('ticker-bar').innerHTML = items.map(t => `
    <div class="tick">
      <span class="tick-sym">${t.sym}/SYP</span>
      <span class="tick-price">${t.price.toLocaleString()}</span>
      <span class="tick-chg ${chgCls(t.chg)}">${chgStr(t.chg)}</span>
    </div>`).join('');
}

function updateHero(latest, data) {
  if (!latest) return;
  const mid = Math.round((latest.buy + latest.sell) / 2);
  const el  = document.getElementById('ph-price');
  el.textContent = mid.toLocaleString();
  document.getElementById('ph-buy').textContent  = fmtN(latest.buy);
  document.getElementById('ph-sell').textContent = fmtN(latest.sell);
  document.getElementById('ph-spread').textContent = fmtN(latest.sell - latest.buy);
  if (latest.timestamp) {
    const d = new Date(latest.timestamp + 'Z');
    document.getElementById('ph-updated').textContent =
      d.toLocaleTimeString('en', {hour:'2-digit',minute:'2-digit'});
  }
  if (data.length) {
    const highs = data.map(d=>d.high||d.sell||d.close).filter(Boolean);
    const lows  = data.map(d=>d.low ||d.buy ||d.open).filter(Boolean);
    document.getElementById('st-high').textContent  = fmtN(Math.max(...highs));
    document.getElementById('st-low').textContent   = fmtN(Math.min(...lows));
    document.getElementById('st-whigh').textContent = fmtN(Math.max(...highs));
    document.getElementById('st-count').textContent = data.length;
  }
}

// ══════════════════════════════════════════════════════════════════
//  LOAD DATA
// ══════════════════════════════════════════════════════════════════
function setStatus(connected) {
  document.getElementById('sb-dot').style.background = connected ? 'var(--green)' : 'var(--red)';
  document.getElementById('sb-status').textContent =
    connected ? 'Connected · sp-today.com' : 'Demo mode · data not real';
}

async function loadData() {
  document.getElementById('loader').classList.remove('gone');
  document.getElementById('loader-txt').textContent = 'LOADING MARKET DATA';

  try {
    const [hist, latest] = await Promise.all([fetchHistory(), fetchLatest()]);
    allData = hist;
    isDemoMode = false;
    setStatus(true);
    document.getElementById('sb-pts').textContent = `${hist.length} real data points`;
    updateHero(latest, hist);
    renderTicker(FX_DATA, latest);
  } catch(e) {
    isDemoMode = true;
    allData = [];
    setStatus(false);
    document.getElementById('sb-pts').textContent = 'historical data (demo)';
    updateHero({ buy:11780, sell:11850, timestamp:new Date().toISOString() }, []);
    renderTicker(FX_DATA, null);
  }

  refresh();
  document.getElementById('loader').classList.add('gone');
}

// ══════════════════════════════════════════════════════════════════
//  DRAWING TOOLS (lightweight implementation)
// ══════════════════════════════════════════════════════════════════
function setActiveTool(tool) {
  activeTool = tool;
  document.querySelectorAll('.draw-btn[data-tool]').forEach(b => {
    b.classList.toggle('active', b.dataset.tool === tool);
  });
  const wrap = document.getElementById('chart-wrap');
  wrap.style.cursor = tool === 'cursor' ? 'default' : 'crosshair';
}

// Horizontal line drawing via click
const drawnLines = [];
document.getElementById('chart-wrap').addEventListener('click', e => {
  if (activeTool !== 'hline') return;
  const rect  = e.currentTarget.getBoundingClientRect();
  const y     = e.clientY - rect.top;
  const price = mainSeries?.coordinateToPrice?.(y);
  if (price == null) return;
  const line = chart.addLineSeries({
    color:'#f0b42980', lineWidth:1,
    lineStyle: LightweightCharts.LineStyle.Dashed,
    priceLineVisible:false, lastValueVisible:false,
  });
  // Draw flat line across full time range
  if (allData.length >= 2) {
    line.setData([
      { time: allData[0].time,                    value: price },
      { time: allData[allData.length-1].time + 86400, value: price },
    ]);
  }
  drawnLines.push(line);
});

document.getElementById('btn-clear').addEventListener('click', () => {
  drawnLines.forEach(l => { try { chart.removeSeries(l); } catch(e){} });
  drawnLines.length = 0;
});

// ══════════════════════════════════════════════════════════════════
//  TOOLBAR EVENTS
// ══════════════════════════════════════════════════════════════════
document.querySelectorAll('[data-tf]').forEach(btn => btn.addEventListener('click', () => {
  document.querySelectorAll('[data-tf]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentTF = btn.dataset.tf;
  refresh();
}));

document.querySelectorAll('[data-ct]').forEach(btn => btn.addEventListener('click', () => {
  document.querySelectorAll('[data-ct]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentCT = btn.dataset.ct;
  refresh();
}));

document.querySelectorAll('.draw-btn[data-tool]').forEach(btn => btn.addEventListener('click', () => {
  setActiveTool(btn.dataset.tool);
}));

document.getElementById('btn-refresh').addEventListener('click', loadData);
document.getElementById('btn-fitcontent').addEventListener('click', () => chart?.timeScale().fitContent());
document.getElementById('btn-screenshot').addEventListener('click', () => {
  const img = chart.takeScreenshot();
  const a = document.createElement('a');
  a.href = img.toDataURL();
  a.download = 'syp-chart.png';
  a.click();
});

// ══════════════════════════════════════════════════════════════════
//  CLOCK
// ══════════════════════════════════════════════════════════════════
function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(tick, 1000); tick();

// ══════════════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════════════
renderCrypto();
renderGold();
renderFuel();
renderFX(FX_DATA);
initChart();
loadData();
setInterval(loadData, REFRESH);
</script>
