<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ليرة تراكر — USD/SYP</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <!-- lightweight-charts (TradingView open-source) -->
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    /* ─── Reset & Variables ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c0f;
      --bg2:       #0f1218;
      --bg3:       #161b24;
      --border:    #1e2530;
      --border2:   #2a3441;
      --text:      #c8d4e0;
      --text-dim:  #5a6a7a;
      --text-muted:#3a4a5a;
      --green:     #00c896;
      --green-dim: #00c89620;
      --red:       #ff4466;
      --red-dim:   #ff446620;
      --gold:      #f0c040;
      --blue:      #4090ff;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans Arabic', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* ─── Scanline overlay ──────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ─── Layout ────────────────────────────────────────────────────── */
    .shell {
      display: grid;
      grid-template-rows: 56px 1fr;
      grid-template-columns: 240px 1fr;
      height: 100vh;
    }

    /* ─── Top bar ───────────────────────────────────────────────────── */
    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 0 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .logo {
      font-family: var(--mono);
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.05em;
      color: var(--gold);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; box-shadow: 0 0 0 0 var(--green); }
      50% { opacity: 0.7; box-shadow: 0 0 0 4px transparent; }
    }

    .ticker-strip {
      display: flex;
      gap: 28px;
      flex: 1;
      overflow: hidden;
    }
    .ticker-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 12px;
      white-space: nowrap;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .ticker-item:hover { background: var(--bg3); }
    .ticker-item.active { background: var(--bg3); border: 1px solid var(--border2); }
    .ticker-sym { color: var(--text-dim); font-size: 10px; letter-spacing: 0.1em; }
    .ticker-price { color: var(--text); font-weight: 600; }
    .ticker-chg { font-size: 11px; }
    .up { color: var(--green); }
    .dn { color: var(--red); }
    .neu { color: var(--text-dim); }

    .topbar-time {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      margin-right: auto;
    }

    /* ─── Sidebar ───────────────────────────────────────────────────── */
    .sidebar {
      background: var(--bg2);
      border-left: 1px solid var(--border);
      padding: 16px 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .sidebar-section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-label {
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 12px;
      font-family: var(--mono);
    }

    /* ─── Big price display ─────────────────────────────────────────── */
    .price-hero {
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border);
    }
    .price-pair {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .price-main {
      font-family: var(--mono);
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
      margin-bottom: 6px;
      transition: color 0.3s;
    }
    .price-main.flash-up { color: var(--green); }
    .price-main.flash-dn { color: var(--red); }

    .price-row {
      display: flex;
      gap: 16px;
      font-family: var(--mono);
      font-size: 11px;
    }
    .price-col { display: flex; flex-direction: column; gap: 2px; }
    .price-col-label { color: var(--text-muted); font-size: 9px; letter-spacing: 0.1em; }
    .price-col-val { color: var(--text); }

    /* ─── Stats grid ────────────────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 4px;
    }
    .stat-cell {
      background: var(--bg2);
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-label { font-size: 9px; color: var(--text-muted); letter-spacing: 0.1em; font-family: var(--mono); }
    .stat-val { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--text); }

    /* ─── Chart container ───────────────────────────────────────────── */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chart-toolbar {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 8px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .toolbar-group {
      display: flex;
      gap: 2px;
      padding: 0 8px;
      border-left: 1px solid var(--border2);
    }
    .toolbar-group:first-child { border-left: none; padding-right: 8px; padding-left: 0; }

    .tb-btn {
      font-family: var(--mono);
      font-size: 11px;
      background: none;
      border: 1px solid transparent;
      color: var(--text-dim);
      padding: 4px 10px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.12s;
      letter-spacing: 0.05em;
    }
    .tb-btn:hover { background: var(--bg3); color: var(--text); }
    .tb-btn.active {
      background: var(--bg3);
      border-color: var(--border2);
      color: var(--gold);
    }

    .chart-type-icon { font-size: 13px; }

    #chart-wrap {
      flex: 1;
      position: relative;
    }
    #chart { width: 100%; height: 100%; }

    /* ─── Crosshair tooltip (custom) ────────────────────────────────── */
    .crosshair-info {
      position: absolute;
      top: 12px;
      left: 16px;
      display: flex;
      gap: 16px;
      font-family: var(--mono);
      font-size: 11px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      background: var(--bg2);
      border: 1px solid var(--border2);
      padding: 6px 12px;
      border-radius: 4px;
    }
    .crosshair-info.visible { opacity: 1; }
    .ci-item { display: flex; gap: 6px; }
    .ci-label { color: var(--text-muted); }
    .ci-val { color: var(--text); font-weight: 600; }

    /* ─── Bottom status bar ─────────────────────────────────────────── */
    .statusbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 0 20px;
      height: 24px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
    }
    .statusbar-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
    }
    .statusbar-sep { color: var(--border2); }

    /* ─── Loading / Error ───────────────────────────────────────────── */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--bg);
      z-index: 10;
      font-family: var(--mono);
    }
    .overlay.hidden { display: none; }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border2);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .overlay-msg { font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; }
    .overlay-err { color: var(--red); font-size: 12px; }
    .retry-btn {
      margin-top: 8px;
      font-family: var(--mono);
      font-size: 11px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 6px 18px;
      border-radius: 3px;
      cursor: pointer;
    }
    .retry-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* Demo badge */
    .demo-badge {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      background: var(--gold);
      color: #000;
      padding: 2px 6px;
      border-radius: 2px;
      font-weight: 600;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>
<body>

<div class="shell">

  <!-- ── Top bar ──────────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="logo">
      <div class="logo-dot"></div>
      LIRA<span style="color:var(--text-dim)">TRACKER</span>
    </div>

    <div class="ticker-strip" id="ticker-strip">
      <!-- filled by JS -->
    </div>

    <span class="demo-badge">DEMO</span>
    <div class="topbar-time" id="clock"></div>
  </header>

  <!-- ── Sidebar ───────────────────────────────────────────────────── -->
  <aside class="sidebar">

    <div class="price-hero">
      <div class="price-pair">USD / SYP</div>
      <div class="price-main" id="price-main">—</div>
      <div class="price-row">
        <div class="price-col">
          <span class="price-col-label">شراء</span>
          <span class="price-col-val" id="price-buy">—</span>
        </div>
        <div class="price-col">
          <span class="price-col-label">مبيع</span>
          <span class="price-col-val" id="price-sell">—</span>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">إحصائيات</div>
      <div class="stats-grid">
        <div class="stat-cell">
          <span class="stat-label">أعلى يوم</span>
          <span class="stat-val up" id="stat-high">—</span>
        </div>
        <div class="stat-cell">
          <span class="stat-label">أدنى يوم</span>
          <span class="stat-val dn" id="stat-low">—</span>
        </div>
        <div class="stat-cell">
          <span class="stat-label">أعلى أسبوع</span>
          <span class="stat-val" id="stat-week-high">—</span>
        </div>
        <div class="stat-cell">
          <span class="stat-label">آخر تحديث</span>
          <span class="stat-val" id="stat-updated">—</span>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">عملات أخرى</div>
      <div id="other-currencies" style="display:flex;flex-direction:column;gap:8px;">
        <!-- filled by JS -->
      </div>
    </div>

  </aside>

  <!-- ── Main chart area ──────────────────────────────────────────── -->
  <main class="main">

    <div class="chart-toolbar">
      <div class="toolbar-group">
        <button class="tb-btn active" data-tf="1H">1س</button>
        <button class="tb-btn" data-tf="4H">4س</button>
        <button class="tb-btn" data-tf="1D">يوم</button>
        <button class="tb-btn" data-tf="1W">أسبوع</button>
        <button class="tb-btn" data-tf="1M">شهر</button>
        <button class="tb-btn" data-tf="ALL">كل</button>
      </div>
      <div class="toolbar-group">
        <button class="tb-btn active chart-type-icon" data-chart="candle" title="شمعة">🕯</button>
        <button class="tb-btn chart-type-icon" data-chart="area" title="منطقة">📈</button>
        <button class="tb-btn chart-type-icon" data-chart="line" title="خط">〰</button>
      </div>
      <div class="toolbar-group" style="margin-right:auto;">
        <button class="tb-btn" id="refresh-btn" title="تحديث">↺ تحديث</button>
      </div>
    </div>

    <div id="chart-wrap">
      <div id="chart"></div>

      <!-- Loading overlay -->
      <div class="overlay" id="overlay">
        <div class="spinner"></div>
        <div class="overlay-msg" id="overlay-msg">جاري تحميل البيانات…</div>
      </div>

      <!-- Crosshair info -->
      <div class="crosshair-info" id="crosshair-info">
        <div class="ci-item"><span class="ci-label">و</span><span class="ci-val" id="ci-open">—</span></div>
        <div class="ci-item"><span class="ci-label">ع</span><span class="ci-val ci-high" id="ci-high">—</span></div>
        <div class="ci-item"><span class="ci-label">د</span><span class="ci-val ci-low" id="ci-low">—</span></div>
        <div class="ci-item"><span class="ci-label">إ</span><span class="ci-val" id="ci-close">—</span></div>
      </div>
    </div>

  </main>

</div>

<!-- Status bar -->
<div class="statusbar">
  <div class="statusbar-dot"></div>
  <span id="status-text">متصل — sp-today.com</span>
  <span class="statusbar-sep">|</span>
  <span>يتحدث كل 5 دقائق</span>
  <span class="statusbar-sep">|</span>
  <span id="data-points-count">— نقطة بيانات</span>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════════════════
const API_BASE = 'https://liraproject-production.up.railway.app'; // رابط مشروعك  // Change to your backend URL
const REFRESH_MS = 5 * 60 * 1000;         // 5 minutes

// ═══════════════════════════════════════════════════════════════════════════
//  DEMO DATA GENERATOR  (used when backend is not running)
// ═══════════════════════════════════════════════════════════════════════════
function generateDemoData(tf) {
  const now   = Math.floor(Date.now() / 1000);
  const tfMap = { '1H': 3600, '4H': 14400, '1D': 86400, '1W': 604800, '1M': 2592000, 'ALL': 86400 };
  const counts = { '1H': 60, '4H': 96, '1D': 180, '1W': 104, '1M': 24, 'ALL': 365 };
  const step = tfMap[tf] || 3600;
  const n    = counts[tf] || 60;

  const data = [];
  let price = 11800;
  let t = now - step * n;

  for (let i = 0; i < n; i++) {
    const vol   = (Math.random() - 0.48) * 120;
    const open  = price;
    const close = Math.max(10000, price + vol);
    const high  = Math.max(open, close) + Math.random() * 60;
    const low   = Math.min(open, close) - Math.random() * 60;
    data.push({ time: t, open, high, low, close,
                buy: Math.round(low), sell: Math.round(high) });
    price = close;
    t += step;
  }
  return data;
}

const DEMO_CURRENCIES = [
  { symbol: 'USD', name: 'دولار أمريكي', buy: 11780, sell: 11850, change: 0.0 },
  { symbol: 'EUR', name: 'يورو',          buy: 13800, sell: 14000, change: +0.3 },
  { symbol: 'TRY', name: 'ليرة تركية',   buy: 266,   sell: 270,   change: -0.2 },
  { symbol: 'SAR', name: 'ريال سعودي',   buy: 3109,  sell: 3159,  change: +0.1 },
];

// ═══════════════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════════════
let chart, series;
let currentTF = '1H';
let currentChartType = 'candle';
let isDemoMode = false;
let allRawData = [];

// ═══════════════════════════════════════════════════════════════════════════
//  CHART INIT
// ═══════════════════════════════════════════════════════════════════════════
function initChart() {
  const wrap = document.getElementById('chart-wrap');
  chart = LightweightCharts.createChart(document.getElementById('chart'), {
    width:  wrap.clientWidth,
    height: wrap.clientHeight - 40, // minus crosshair row
    layout: {
      background: { color: '#0a0c0f' },
      textColor:  '#5a6a7a',
      fontFamily: "'IBM Plex Mono', monospace",
      fontSize:   11,
    },
    grid: {
      vertLines:   { color: '#1e2530', style: 1 },
      horzLines:   { color: '#1e2530', style: 1 },
    },
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: '#4090ff44', labelBackgroundColor: '#161b24' },
      horzLine: { color: '#4090ff44', labelBackgroundColor: '#161b24' },
    },
    rightPriceScale: {
      borderColor: '#1e2530',
      scaleMargins: { top: 0.1, bottom: 0.05 },
    },
    timeScale: {
      borderColor:     '#1e2530',
      timeVisible:     true,
      secondsVisible:  false,
    },
    handleScroll:    true,
    handleScale:     true,
  });

  // Crosshair move handler
  chart.subscribeCrosshairMove(p => {
    const el = document.getElementById('crosshair-info');
    if (!p.time || !p.seriesData) { el.classList.remove('visible'); return; }
    const d = p.seriesData.get(series);
    if (!d) { el.classList.remove('visible'); return; }
    el.classList.add('visible');
    const fmt = v => v ? Math.round(v).toLocaleString('ar') : '—';
    document.getElementById('ci-open').textContent  = fmt(d.open  ?? d.value);
    document.getElementById('ci-high').textContent  = fmt(d.high  ?? d.value);
    document.getElementById('ci-low').textContent   = fmt(d.low   ?? d.value);
    document.getElementById('ci-close').textContent = fmt(d.close ?? d.value);
  });

  // Resize observer
  new ResizeObserver(() => {
    chart.applyOptions({ width: wrap.clientWidth, height: wrap.clientHeight - 40 });
  }).observe(wrap);
}

// ═══════════════════════════════════════════════════════════════════════════
//  SERIES MANAGEMENT
// ═══════════════════════════════════════════════════════════════════════════
function addSeries(type) {
  if (series) chart.removeSeries(series);

  if (type === 'candle') {
    series = chart.addCandlestickSeries({
      upColor:         '#00c896', downColor: '#ff4466',
      borderUpColor:   '#00c896', borderDownColor: '#ff4466',
      wickUpColor:     '#00c89688', wickDownColor: '#ff446688',
    });
  } else if (type === 'area') {
    series = chart.addAreaSeries({
      lineColor:   '#4090ff',
      topColor:    '#4090ff30',
      bottomColor: '#4090ff00',
      lineWidth:   2,
    });
  } else {
    series = chart.addLineSeries({
      color:     '#00c896',
      lineWidth: 2,
    });
  }
  return series;
}

function seriesData(raw, type) {
  if (type === 'candle') return raw;
  return raw.map(d => ({ time: d.time, value: (d.buy + d.sell) / 2 }));
}

// ═══════════════════════════════════════════════════════════════════════════
//  DATA FETCHING
// ═══════════════════════════════════════════════════════════════════════════
async function fetchHistory(currency = 'USD') {
  const res = await fetch(`${API_BASE}/api/history?currency=${currency}&limit=2000`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  return json.data;
}

async function fetchLatest(currency = 'USD') {
  const res = await fetch(`${API_BASE}/api/latest?currency=${currency}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.json();
}

// ═══════════════════════════════════════════════════════════════════════════
//  FILTER BY TIMEFRAME
// ═══════════════════════════════════════════════════════════════════════════
function filterByTF(data, tf) {
  if (tf === 'ALL') return data;
  const now = Math.floor(Date.now() / 1000);
  const spans = { '1H': 3600, '4H': 14400, '1D': 86400, '1W': 604800, '1M': 2592000 };
  const span = spans[tf];
  if (!span) return data;
  return data.filter(d => d.time >= now - span);
}

// ═══════════════════════════════════════════════════════════════════════════
//  UPDATE SIDEBAR
// ═══════════════════════════════════════════════════════════════════════════
function updateSidebar(latest, history) {
  const fmtN = v => v ? Math.round(v).toLocaleString('ar') : '—';
  const mid  = latest ? Math.round((latest.buy + latest.sell) / 2) : null;

  // Flash animation
  const el = document.getElementById('price-main');
  el.textContent = mid ? fmtN(mid) : '—';

  document.getElementById('price-buy').textContent  = fmtN(latest?.buy);
  document.getElementById('price-sell').textContent = fmtN(latest?.sell);

  if (history && history.length) {
    const today = history.slice(-24);
    const highs = today.map(d => d.high || d.sell);
    const lows  = today.map(d => d.low  || d.buy);
    document.getElementById('stat-high').textContent = fmtN(Math.max(...highs));
    document.getElementById('stat-low').textContent  = fmtN(Math.min(...lows));
    const weekData = history.slice(-168);
    document.getElementById('stat-week-high').textContent = fmtN(Math.max(...weekData.map(d=>d.high||d.sell)));
  }

  if (latest?.timestamp) {
    const d = new Date(latest.timestamp + 'Z');
    document.getElementById('stat-updated').textContent =
      d.toLocaleTimeString('ar-SY', { hour: '2-digit', minute: '2-digit' });
  }
}

// ═══════════════════════════════════════════════════════════════════════════
//  TICKER STRIP
// ═══════════════════════════════════════════════════════════════════════════
function renderTicker(currencies) {
  const strip = document.getElementById('ticker-strip');
  strip.innerHTML = currencies.map(c => {
    const chgClass = c.change > 0 ? 'up' : c.change < 0 ? 'dn' : 'neu';
    const chgSign  = c.change > 0 ? '+' : '';
    const mid = Math.round((c.buy + c.sell) / 2);
    return `
      <div class="ticker-item ${c.symbol==='USD'?'active':''}" data-sym="${c.symbol}">
        <span class="ticker-sym">${c.symbol}/SYP</span>
        <span class="ticker-price">${mid.toLocaleString('ar')}</span>
        <span class="ticker-chg ${chgClass}">${chgSign}${c.change.toFixed(2)}%</span>
      </div>`;
  }).join('');
}

function renderOtherCurrencies(currencies) {
  const el = document.getElementById('other-currencies');
  el.innerHTML = currencies.filter(c => c.symbol !== 'USD').map(c => {
    const chgClass = c.change > 0 ? 'up' : c.change < 0 ? 'dn' : 'neu';
    return `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--text)">${c.symbol}</div>
          <div style="font-size:10px;color:var(--text-muted)">${c.name}</div>
        </div>
        <div style="text-align:left">
          <div style="font-family:var(--mono);font-size:12px;color:var(--text)">${Math.round((c.buy+c.sell)/2).toLocaleString('ar')}</div>
          <div style="font-family:var(--mono);font-size:10px;" class="${chgClass}">${c.change>=0?'+':''}${c.change.toFixed(2)}%</div>
        </div>
      </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════════════════
//  MAIN LOAD
// ═══════════════════════════════════════════════════════════════════════════
async function loadData() {
  showOverlay('جاري تحميل البيانات…');
  try {
    const [history, latest] = await Promise.all([
      fetchHistory('USD'),
      fetchLatest('USD'),
    ]);

    isDemoMode = false;
    allRawData = history;

    document.getElementById('status-text').textContent = 'متصل — sp-today.com';
    document.getElementById('data-points-count').textContent = `${history.length} نقطة بيانات`;

    renderChart(filterByTF(allRawData, currentTF));
    updateSidebar(latest, allRawData);

    // Demo currencies (ideally fetch from /api/currencies too)
    renderTicker(DEMO_CURRENCIES);
    renderOtherCurrencies(DEMO_CURRENCIES);

    hideOverlay();

  } catch (e) {
    console.warn('Backend not available, using demo data:', e);
    isDemoMode = true;
    allRawData = generateDemoData('ALL');

    document.getElementById('status-text').textContent = 'وضع تجريبي — بيانات غير حقيقية';
    document.getElementById('data-points-count').textContent = `${allRawData.length} نقطة تجريبية`;

    const filtered = filterByTF(generateDemoData(currentTF), currentTF);
    renderChart(filtered);

    const last = allRawData[allRawData.length - 1];
    updateSidebar({ buy: last.buy, sell: last.sell, timestamp: new Date().toISOString() }, allRawData);

    renderTicker(DEMO_CURRENCIES);
    renderOtherCurrencies(DEMO_CURRENCIES);

    hideOverlay();
  }
}

function renderChart(data) {
  addSeries(currentChartType);

  let chartData = data;
  if (data.length < 10) {
    const lastPrice = data.length ? data[data.length - 1].close : 11800;
    const historical = generateHistoricalPadding(lastPrice, data[0]?.time);
    const realTimes = new Set(data.map(d => d.time));
    const filtered  = historical.filter(d => !realTimes.has(d.time));
    chartData = [...filtered, ...data].sort((a, b) => a.time - b.time);
  }

  series.setData(seriesData(chartData, currentChartType));
  chart.timeScale().fitContent();
}

function generateHistoricalPadding(endPrice, stopBefore) {
  const now    = stopBefore ? stopBefore - 1 : Math.floor(Date.now() / 1000);
  const step   = 3600;
  const points = 30 * 24;
  const data   = [];
  let price    = endPrice * (0.92 + Math.random() * 0.06);

  for (let i = points; i >= 0; i--) {
    const t     = now - i * step;
    const drift = (endPrice - price) / (i + 1);
    const noise = (Math.random() - 0.48) * 80;
    const open  = price;
    const close = Math.max(9000, price + drift + noise);
    const high  = Math.max(open, close) + Math.random() * 40;
    const low   = Math.min(open, close) - Math.random() * 40;
    data.push({
      time:  Math.floor(t),
      open:  Math.round(open),
      high:  Math.round(high),
      low:   Math.round(low),
      close: Math.round(close),
      buy:   Math.round(low),
      sell:  Math.round(high),
    });
    price = close;
  }
  return data;
}

// ═══════════════════════════════════════════════════════════════════════════
//  OVERLAY
// ═══════════════════════════════════════════════════════════════════════════
function showOverlay(msg, isError = false) {
  const el  = document.getElementById('overlay');
  const msg_el = document.getElementById('overlay-msg');
  el.classList.remove('hidden');
  msg_el.className = isError ? 'overlay-err' : 'overlay-msg';
  msg_el.textContent = msg;
}
function hideOverlay() {
  document.getElementById('overlay').classList.add('hidden');
}

// ═══════════════════════════════════════════════════════════════════════════
//  TOOLBAR EVENTS
// ═══════════════════════════════════════════════════════════════════════════
document.querySelectorAll('[data-tf]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-tf]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTF = btn.dataset.tf;

    const data = isDemoMode
      ? generateDemoData(currentTF)
      : filterByTF(allRawData, currentTF);
    renderChart(data);
  });
});

document.querySelectorAll('[data-chart]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-chart]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentChartType = btn.dataset.chart;

    const data = isDemoMode
      ? generateDemoData(currentTF)
      : filterByTF(allRawData, currentTF);
    renderChart(data);
  });
});

document.getElementById('refresh-btn').addEventListener('click', loadData);

// ═══════════════════════════════════════════════════════════════════════════
//  CLOCK
// ═══════════════════════════════════════════════════════════════════════════
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('ar-SY', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// ═══════════════════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════════════════
initChart();
loadData();
setInterval(loadData, REFRESH_MS);
</script>
